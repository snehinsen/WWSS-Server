spring:
  application:
    name: hp-socials-server
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/oauth2/code/google"
            scope:
              - email
              - profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope:
              - email
              - profile
  reactor:
    debug-agent:
      enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB
  web:
    error:
      path: /error

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      model: sonnet-4
      chat:
        options:
          cache-options:
            enabled: false
          max-tokens: 2048
    ollama:
      base-url: https://wwss-ai.sanjaysen.me
      chat:
        model: qwen3.5:latest


server:
  port: 8544
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      protocol-header: x-forwarded-proto
      remote-ip-header: x-forwarded-for
      host-header: x-forwarded-host

